name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        env:
          RUSTFLAGS: "-D warnings"
          CARGO_TERM_COLOR: always
        run: cargo build --release --locked

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install --locked cargo-deb
          cargo install --locked cargo-generate-rpm

      - name: Build .deb (Debian/Ubuntu)
        run: cargo deb --no-build --no-strip

      - name: Build .rpm (Fedora/RHEL)
        run: cargo generate-rpm

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp target/release/tad dist/tad-${GITHUB_REF_NAME}-x86_64-linux
          cp completions/_tad dist/_tad
          cp completions/tad.bash dist/tad.bash
          cp examples/groups.yaml.example dist/groups.yaml.example
          cp examples/config.yaml.example dist/config.yaml.example
          cp LICENSE dist/LICENSE
          # cargo-deb names .deb as <pkg>_<ver>-1_<arch>.deb under target/debian/
          cp target/debian/tad_*_amd64.deb "dist/tad-${GITHUB_REF_NAME}-x86_64.deb"
          # cargo-generate-rpm names .rpm as <pkg>-<ver>-1.<arch>.rpm under target/generate-rpm/
          cp target/generate-rpm/tad-*.x86_64.rpm "dist/tad-${GITHUB_REF_NAME}-x86_64.rpm"
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "tad ${{ github.ref_name }}"
          body: |
            Release ${{ github.ref_name }}.

            Linux x86_64 binary, `.deb` (Debian/Ubuntu), `.rpm`
            (Fedora/RHEL), and shell completions attached. See README
            for install instructions.
          files: |
            dist/tad-${{ github.ref_name }}-x86_64-linux
            dist/tad-${{ github.ref_name }}-x86_64.deb
            dist/tad-${{ github.ref_name }}-x86_64.rpm
            dist/_tad
            dist/tad.bash
            dist/groups.yaml.example
            dist/config.yaml.example
            dist/LICENSE
            dist/SHA256SUMS
